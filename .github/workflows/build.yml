name: Build OpenWrt Archer A6

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Download ImageBuilder
        run: |
          wget https://downloads.openwrt.org/releases/23.05.5/targets/ath79/generic/openwrt-imagebuilder-23.05.5-ath79-generic.Linux-x86_64.tar.xz
          tar -xf openwrt-imagebuilder-23.05.5-ath79-generic.Linux-x86_64.tar.xz

      - name: Build image
        run: |
          cd openwrt-imagebuilder-23.05.5-ath79-generic.Linux-x86_64
          make image PROFILE="tplink_archer-c6-v2" PACKAGES="luci luci-ssl xray-core pbr luci-app-pbr dnsmasq-full ca-bundle curl nano ip-full"

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: Archer-A6-OpenWrt
          path: openwrt-imagebuilder-23.05.5-ath79-generic.Linux-x86_64/bin/targets/ath79/generic/

name: Build OpenWrt Archer A6 VLESS Minimal

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Download ImageBuilder
        run: |
          wget https://downloads.openwrt.org/releases/23.05.5/targets/ath79/generic/openwrt-imagebuilder-23.05.5-ath79-generic.Linux-x86_64.tar.xz
          tar -xf openwrt-imagebuilder-23.05.5-ath79-generic.Linux-x86_64.tar.xz

      - name: Build firmware
        run: |
          cd openwrt-imagebuilder-23.05.5-ath79-generic.Linux-x86_64

          make image \
          PROFILE="tplink_archer-c6-v2" \
          PACKAGES="xray-core pbr dnsmasq-full ca-bundle kmod-tun iptables-nft ip-full"

      - name: Check image
        run: |
          echo "=== Images ==="
          find . -name "*sysupgrade*"

      - name: Prepare firmware
        run: |
          mkdir output
          find . -name "*squashfs-sysupgrade.bin" -exec cp {} output/ \;
          ls -lh output

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: Archer-A6-VLESS-Minimal
          path: output/
